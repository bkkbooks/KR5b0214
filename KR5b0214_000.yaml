front:
  text: 黃籙五老悼亡儀
  hash: sha256:be3f4aee3ceb1072c2ed0f9a8a456d96a5224891a4be68590a37c84ed223105a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0214_HFL_000-001a, image: hfl/0291/0291-056.png}
body:
  text: 法事如式伏以混元未判包一氣以為先太極既分配三才而五立由是三生萬物五極居中位設五方數分五氣天有五星而列照地有五嶽以攸司縱橫而布九宫之圖生成而現兩儀之像惟五老以定位與一氣以同生仰奉三清垂慈萬劫救度羣品濟拔亡魂敬者生天聞者滅罪今辰某資薦亡過某早罹五濁之境未明五藴之空耳聞五音舌貪五味眼觀五色而不期惑亂身耽五欲而自取昏迷豈知五行之數終仍隨五苦之惡趣今則舉揚睿號宣演祕文似影逐形隨方懴悔仰慿法衆同心慈悲奉為亡人䖍誠懴悔舉按人各恭敬吟偈普獻無邊聖香煙散十方諸天無量聖日月斗星辰玄師經籙祖天府衆髙真願垂大慈力超度此亡魂普獻無邊聖香煙透冥關鄷都岱嶽府考較罪魂司幽牢遍諸獄地府衆威靈願垂大慈力超度此亡靈普獻無邊聖香煙散扶桑江河淮濟海雷電雨龍神十洲三島谷水府衆真仙願垂大慈力超度此亡靈舉志心皈命禮東方青靈始老九氣天君志心皈命東方主安寶華林大慈尊青陽木德發生香角亢氐房標本位青華宫內瞻慈相色界諸天仰至尊寶光童子捧符來耀景靈幡拔衆苦懴悔亡人眼根罪風雷地獄盡消除鑊湯爐炭化成灰神識不經斯苦地青天魔王為保舉皇笳天上恣遨遊焚香仰啓大慈尊引領亡人生樂國舉志心皈命禮南方丹靈真老三氣天君志心歸命南方主梵寶昌陽大慈尊未明火德耀丹罡井鬼柳星標本位丹靈宫內瞻慈相無色諸天仰至尊丹靈童子捧符來華景靈幡拔衆苦懴悔亡人舌根罪銅柱地獄盡消除鎔銅吞火變醍醐神識不經斯苦地赤天魔王為保舉浮容天上任逍遙焚香仰啓大慈尊引領亡魂生快樂舉志心皈命禮西方皓靈素老七氣天君志心皈命西方主七寶金門大慈尊皓靈白帝太隂君胃昴觜參標本位素皇宫裏瞻慈相四種旻天仰至尊定光童子捧符來玉葉靈旙消衆苦懴悔亡人鼻根罪金剛地獄盡消除鋒刀屠割不傷身神識不經斯苦地日天魔王為保舉常融天上恣遨遊焚香仰啓大慈尊引領亡人生淨境舉志心皈命禮北方黑靈玄元五氣天君志心歸命北方主洞隂朔單大慈尊黑靈水帝五靈君室壁虛危標本位五靈宫裏瞻慈相六欲諸天仰至尊開明童子捧符來定水靈旙拔衆苦懴悔亡人耳根罪溟汵地獄悉消除寒氷自覺暖煙生神識不經斯苦地黑天魔王為保舉元明天上恣躋攀災香仰啓大慈尊願引亡人生仙界舉志心皈命禮中央黃靈皇老一氣天君志心歸命中央主黃靈皇老大慈尊黃中理氣表方維土宿地睺居正位玉虛上帝慈光照洞神天尊救苦來妙光童子奉命至舞鶴靈旙拔罪苦懴悔亡人身業罪普掠地獄盡消除力山劒樹化騫林神識不經斯苦地黃天魔王為保舉大羅天上恣遨遊焚香仰啓大慈尊願度亡人生樂國舉志心稽首禮無上正真三寶天尊志心懴悔身口意三業罪無量亦無邊今對大慈尊一心陳懴悔貪嗔癡愚罪無量亦無邊今對大慈尊一心陳懴悔殺害邪淫罪無量亦無邊今對大慈尊一心陳懴悔向來宣陳懴悔萬罪消除奉為亡靈皈依三寶志心歸依無上道大羅元始尊奉為此亡靈衆和往生神仙界舉志心歸依無上經龍章鳯篆丈奉為此亡靈衆和往生神仙界舉志心歸依無上師玄中大法師奉為此亡靈衆和往生神仙界舉志心歸依三寶巳回此妙良因七祖及九玄衆和同生極樂國舉志心歸依三寶巳回此妙良因五道與三塗衆和同生極樂國舉向來向來稱揚五方五老並巳周圎奉為亡靈往生天界伏願清魂不昧淨魄昭然落罪籍於黑編注生名於丹簡達初心於淸靜悟本性以逍遙乘彼碧霞涉諸妙域脫死因於九地證生理於三天鶴駕雲車入大羅之法會寶旙絳節登浪苑之仙階亡者生天見存獲福上窮圎極下及方隅有識無情同登道岸黃籙五老悼亡儀
